<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>课题项目 - 智能系统实验室</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .category-content {
      padding-top: 70px;
    }
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 0;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .item-thumbnail {
      background: var(--bg-secondary);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }
    .item-thumbnail img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s ease;
    }
    .item-card:hover .item-thumbnail img {
      transform: scale(1.05);
    }
    .item-content-wrapper {
      padding: 30px;
      display: flex;
      flex-direction: column;
    }
    .item-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 15px;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    .item-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-content {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    .item-author {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .item-link:hover {
      color: var(--primary-dark);
    }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: #fff;
    }
    .btn-sm {
      padding: 8px 20px;
      font-size: 14px;
    }
    #contentList {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .item-card[data-date] {
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .pagination-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 40px;
      padding: 20px 0;
    }
    .pagination-btn {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      background: #fff;
      color: var(--text-primary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      min-width: 80px;
    }
    .pagination-btn:hover:not(:disabled) {
      background: var(--primary-color);
      color: #fff;
      border-color: var(--primary-color);
    }
    .pagination-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .pagination-info {
      color: var(--text-secondary);
      font-size: 14px;
      padding: 0 20px;
    }
    .pagination-pages {
      display: flex;
      gap: 5px;
    }
    .pagination-page {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border-color);
      background: #fff;
      color: var(--text-primary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pagination-page:hover {
      background: var(--primary-color);
      color: #fff;
      border-color: var(--primary-color);
    }
    .pagination-page.active {
      background: var(--primary-color);
      color: #fff;
      border-color: var(--primary-color);
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>

    // 分页相关变量
    let currentPage = 1;
    const itemsPerPage = 5;

    // 按年份自动排序（从新到旧）
    function sortProjectsByDate() {
      return projectsData.sort((a, b) => {
        const dateA = a.date.replace(/-/g, '');
        const dateB = b.date.replace(/-/g, '');
        return dateB.localeCompare(dateA); // 降序：从新到旧
      });
    }

    // 获取当前页的项目
    function getCurrentPageProjects(projects) {
      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      return projects.slice(startIndex, endIndex);
    }

    // 计算总页数
    function getTotalPages(projects) {
      return Math.ceil(projects.length / itemsPerPage);
    }

    // 渲染分页控件
    function renderPagination(totalPages) {
      const paginationContainer = document.getElementById('pagination');

      if (totalPages <= 1) {
        paginationContainer.innerHTML = '';
        return;
      }

      let paginationHTML = `
        <button class="pagination-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
          上一页
        </button>
        <div class="pagination-pages">
      `;

      for (let i = 1; i <= totalPages; i++) {
        paginationHTML += `
          <button class="pagination-page ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">
            ${i}
          </button>
        `;
      }

      paginationHTML += `
        </div>
        <button class="pagination-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
          下一页
        </button>
        <span class="pagination-info">
          第 ${currentPage} / ${totalPages} 页，共 ${projectsData.length} 项
        </span>
      `;

      paginationContainer.innerHTML = paginationHTML;
    }

    // 跳转到指定页
    function goToPage(page) {
      const sortedProjects = sortProjectsByDate();
      const totalPages = getTotalPages(sortedProjects);

      if (page < 1 || page > totalPages) return;

      currentPage = page;
      renderProjectCards();

      // 滚动到列表顶部
      document.getElementById('contentList').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 渲染项目卡片
    function renderProjectCards() {
      const contentList = document.getElementById('contentList');
      const sortedProjects = sortProjectsByDate();
      const currentProjects = getCurrentPageProjects(sortedProjects);
      const totalPages = getTotalPages(sortedProjects);

      if (sortedProjects.length === 0) {
        contentList.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📋</div>
            <h3>暂无项目</h3>
            <p>敬请期待...</p>
          </div>
        `;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      contentList.innerHTML = currentProjects.map(project => `
        <div class="item-card" data-date="${project.date}">
          <div class="item-thumbnail">
            <img src="${project.thumbnail}" alt="项目封面图" onerror="this.onerror=null; this.src='../../lab-logo.png'" />
          </div>
          <div class="item-content-wrapper">
            <div class="item-title">${project.title}</div>
            <div class="item-meta">
              <span>🏷️ ${project.category}</span>
              <span>📅 ${project.period}</span>
            </div>
            <div class="item-content">
              ${project.summary}
            </div>
            <div class="item-footer">
              <div class="item-author">
                <span>👤</span>
                <a href="../members/index.html" class="item-link">${project.authors}</a>
              </div>
              <a href="${project.link}" class="btn btn-sm">查看详情</a>
            </div>
          </div>
        </div>
      `).join('');

      // 渲染分页控件
      renderPagination(totalPages);
    }

    // 页面加载完成后自动渲染
    document.addEventListener('DOMContentLoaded', renderProjectCards);
  </script>
