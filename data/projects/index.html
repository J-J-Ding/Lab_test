<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>课题项目 - 智能系统实验室</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .category-content {
      padding-top: 70px;
    }
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 0;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .item-thumbnail {
      background: var(--bg-secondary);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }
    .item-thumbnail img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s ease;
    }
    .item-card:hover .item-thumbnail img {
      transform: scale(1.05);
    }
    .item-content-wrapper {
      padding: 30px;
      display: flex;
      flex-direction: column;
    }
    .item-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 15px;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    .item-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-content {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    .item-author {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .item-link:hover {
      color: var(--primary-dark);
    }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: #fff;
    }
    .btn-sm {
      padding: 8px 20px;
      font-size: 14px;
    }
    #contentList {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .item-card[data-date] {
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 统一导航栏 -->
  <div id="navbar-container"></div>

  <main class="main-content category-content">
    <section class="section">
      <div class="section-container">
        <div class="section-header">
          <h2>课题项目</h2>
          <p class="section-subtitle">Research Projects</p>
        </div>

        <div id="contentList">
          <!-- 项目卡片由 JavaScript 自动渲染和排序 -->
        </div>
      </div>
    </section>
  </main>

  <script src="../../js/search.js"></script>
  <script src="../../js/navbar-loader.js"></script>
  <script>
    // 项目数据 - 所有项目信息集中在这里管理，无需手动排序
    const projectsData = [
      {
        date: '2025',
        thumbnail: '202505Grid_Distributed_Control/封面图.png',
        title: 'xxxx',
        category: '国家自然科学重点项目',
        period: '2025-2027',
        summary: '本项目聚焦xxx',
        authors: '王燕舞, 肖江文',
        link: '202505Grid_Distributed_Control/index.html'
      },
    ];

    // 按年份自动排序（从新到旧）
    function sortProjectsByDate() {
      return projectsData.sort((a, b) => {
        const yearA = parseInt(a.date);
        const yearB = parseInt(b.date);
        return yearB - yearA; // 降序：从新到旧
      });
    }

    // 渲染项目卡片
    function renderProjectCards() {
      const contentList = document.getElementById('contentList');
      const sortedProjects = sortProjectsByDate();

      if (sortedProjects.length === 0) {
        contentList.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📋</div>
            <h3>暂无项目</h3>
            <p>敬请期待...</p>
          </div>
        `;
        return;
      }

      contentList.innerHTML = sortedProjects.map(project => `
        <div class="item-card" data-date="${project.date}">
          <div class="item-thumbnail">
            <img src="${project.thumbnail}" alt="项目封面图" onerror="this.onerror=null; this.src='../../lab-logo.png'" />
          </div>
          <div class="item-content-wrapper">
            <div class="item-title">${project.title}</div>
            <div class="item-meta">
              <span>🏷️ ${project.category}</span>
              <span>📅 ${project.period}</span>
            </div>
            <div class="item-content">
              ${project.summary}
            </div>
            <div class="item-footer">
              <div class="item-author">
                <span>👤</span>
                <a href="../members/index.html" class="item-link">${project.authors}</a>
              </div>
              <a href="${project.link}" class="btn btn-sm">查看详情</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 页面加载完成后自动渲染
    document.addEventListener('DOMContentLoaded', renderProjectCards);
  </script>

</body>
</html>
