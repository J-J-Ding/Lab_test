<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>发表论文 - 智能系统实验室</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/pagination.css" />
  <style>
    .category-content {
      padding-top: 70px;
    }
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 0;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .item-thumbnail {
      background: var(--bg-secondary);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }
    .item-thumbnail img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s ease;
    }
    .item-card:hover .item-thumbnail img {
      transform: scale(1.05);
    }
    .item-content-wrapper {
      padding: 30px;
      display: flex;
      flex-direction: column;
    }
    .item-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 15px;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    .item-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-content {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    .item-author {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item-author img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .item-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .item-link:hover {
      color: var(--primary-dark);
    }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, #3498db, #5dade2);
      color: #fff;
    }
    .btn-sm {
      padding: 8px 20px;
      font-size: 14px;
    }
    #contentList {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .item-card[data-date] {
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 统一导航栏 -->
  <div id="navbar-container"></div>
  
  <main class="main-content category-content">
    <section class="section">
      <div class="section-container">
        <div class="section-header">
          <h2>发表论文</h2>
          <p class="section-subtitle">Publications</p>
        </div>
        
        <div id="contentList">
          <!-- 论文卡片由 JavaScript 自动渲染和排序 -->
        </div>

        <!-- 分页控件 -->
        <div class="pagination-container" id="pagination">
        </div>
      </div>
    </section>
  </main>
  
  <script src="../../js/search.js"></script>
  <script src="../../js/navbar-loader.js"></script>
  <script src="../../js/pagination.js"></script>
  <script>
    // 论文数据 - 所有论文信息集中在这里管理，无需手动排序
    const papersData = [
      {
        date: '2023-08',
        thumbnail: '202308_A new deep clustering method with application to customer selection for demand response program/封面图.png',
        title: 'A New Deep Clustering Method for Demand Response Program',
        journal: 'International Journal of Electrical Power & Energy Systems',
        summary: 'Demand response (DR) is regarded as a promising solution to the problem of renewable energy integration, while it remains one of the key barriers for DR to target the right customers, i.e. the customers with high potential in peak reduction...',
        authors: 'Jiang-Wen Xiao, Yutao Xie, Hongliang Fang, Yan-Wu Wang',
        link: '202308_A new deep clustering method with application to customer selection for demand response program/index.html'
      },
      
    ];

    // 按日期自动排序（从新到旧）
    function sortPapersByDate() {
      return papersData.sort((a, b) => {
        const dateA = new Date(a.date);
        const dateB = new Date(b.date);
        return dateB - dateA; // 降序：从新到旧
      });
    }

    // 渲染论文卡片
    function renderPaperCards() {
      const contentList = document.getElementById('contentList');
      const sortedPapers = sortPapersByDate();

      if (sortedPapers.length === 0) {
        contentList.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📄</div>
            <h3>暂无论文</h3>
            <p>敬请期待...</p>
          </div>
        `;
        return;
      }

      // 使用分页数据渲染
      const currentPageItems = window.getCurrentPageItems ? window.getCurrentPageItems() : sortedPapers;

      contentList.innerHTML = currentPageItems.map(paper => `
        <div class="item-card" data-date="${paper.date}">
          <div class="item-thumbnail">
            <img src="${paper.thumbnail}" alt="paper photo" onerror="this.onerror=null; this.src='../../lab-logo.png'" />
          </div>
          <div class="item-content-wrapper">
            <div class="item-title">${paper.title}</div>
            <div class="item-meta">
              <span>📄 ${paper.journal}</span>
              <span>📅 ${paper.date}</span>
            </div>
            <div class="item-content">
              ${paper.summary}
            </div>
            <div class="item-footer">
              <div class="item-author">
                <span>👤</span>
                <a href="../members/index.html" class="item-link">${paper.authors}</a>
              </div>
              <a href="${paper.link}" class="btn btn-sm">查看详情</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 暴露给分页模块使用的渲染函数
    window.renderContent = renderPaperCards;

    // 页面加载完成后自动渲染
    document.addEventListener('DOMContentLoaded', function() {
      const sortedPapers = sortPapersByDate();
      if (window.initPagination) {
        window.initPagination(sortedPapers);
        renderPaperCards();
      } else {
        renderPaperCards();
      }
    });
  </script>

</body>
</html>
