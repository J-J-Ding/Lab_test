<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>技术博客 - 智能系统实验室</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .category-content {
      padding-top: 70px;
    }
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 0;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .item-thumbnail {
      background: var(--bg-secondary);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }
    .item-thumbnail img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s ease;
    }
    .item-card:hover .item-thumbnail img {
      transform: scale(1.05);
    }
    .item-content-wrapper {
      padding: 30px;
      display: flex;
      flex-direction: column;
    }
    .item-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 15px;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    .item-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-content {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    .item-author {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .item-link:hover {
      color: var(--primary-dark);
    }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, #0066cc, #004499);
      color: #fff;
    }
    .btn-sm {
      padding: 8px 20px;
      font-size: 14px;
    }
    #contentList {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .item-card[data-date] {
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 统一导航栏 -->
  <div id="navbar-container"></div>

  <main class="main-content category-content">
    <section class="section">
      <div class="section-container">
        <div class="section-header">
          <h2>技术博客</h2>
          <p class="section-subtitle">Technical Blogs</p>
        </div>

        <div id="contentList">
          <!-- 博客卡片 - 按发布时间排序 -->
          <div class="item-card" data-date="2025-01-15">
            <div class="item-thumbnail">
              <img src="../../lab-logo.png" alt="深度学习入门与实践" />
            </div>
            <div class="item-content-wrapper">
              <div class="item-title">深度学习入门与实践</div>
              <div class="item-meta">
                <span>👤 作者：王燕舞</span>
                <span>📅 2025-01-15</span>
                <span>⏱️ 阅读时间：15分钟</span>
              </div>
              <div class="item-content">
                深度学习作为人工智能领域的核心技术，近年来在图像识别、自然语言处理、语音识别等多个领域取得了突破性进展。本文将从深度学习的基本概念入手，介绍神经网络的核心原理，并结合实际案例...
              </div>
              <div class="item-footer">
                <div class="item-author">
                  <span>🏷️</span>
                  <span>技术分享</span>
                </div>
                <a href="Deep_Learning_Introduction/index.html" class="btn btn-sm">阅读全文</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../../js/search.js"></script>
  <script src="../../js/navbar-loader.js"></script>

</body>
</html>
