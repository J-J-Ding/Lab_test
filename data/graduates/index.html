<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>成员去向 - 智能系统实验室</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/pagination.css" />
  <style>
    .category-content {
      padding-top: 70px;
    }
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 0;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .item-thumbnail {
      background: var(--bg-secondary);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }
    .item-thumbnail img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s ease;
    }
    .item-card:hover .item-thumbnail img {
      transform: scale(1.05);
    }
    .item-thumbnail-placeholder {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: #fff;
      font-size: 48px;
      font-weight: bold;
    }
    .item-content-wrapper {
      padding: 30px;
      display: flex;
      flex-direction: column;
    }
    .item-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 15px;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    .item-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-content {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .item-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 15px;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .info-icon {
      font-size: 18px;
    }
    .info-label {
      font-weight: 500;
      color: var(--text-primary);
    }
    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    .graduate-company {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: var(--primary-color);
    }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, #0066cc, #004499);
      color: #fff;
    }
    .item-card[data-year] {
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 统一导航栏 -->
  <div id="navbar-container"></div>
  
  <main class="main-content category-content">
    <section class="section">
      <div class="section-container">
        <div class="section-header">
          <h2>成员去向</h2>
          <p class="section-subtitle">Graduate Career</p>
        </div>

        <div id="contentList">
          <!-- 毕业生卡片将通过JS自动加载并排序 -->
        </div>

        <!-- 分页控件 -->
        <div class="pagination-container" id="pagination">
        </div>
      </div>
    </section>
  </main>

  <script src="../../js/search.js"></script>
  <script src="../../js/navbar-loader.js"></script>
  <script src="../../js/pagination.js"></script>
  <script>
    // 毕业生数据列表 - 按年份从新到老排列
    const graduatesData = [
      {
        year: '2025',
        name: '陈悦江',
        degree: '硕士学位',
        field: '深度学习',
        summary: '陈悦江同学于2022年加入智能系统实验室。在读期间，主要从事深度学习与时间序列预测相关研究，参与多项国家级项目，发表高水平论文3篇。',
        papers: '3篇',
        patents: '1项',
        awards: '1项',
        company: '南方电网',
        position: '算法工程师',
        photo: 'figs/陈悦江.jpg'
      },
      
      // 在此处添加更多毕业生，格式如下：
      // {
      //   year: 'YYYY',
      //   name: '姓名',
      //   degree: '学位',
      //   field: '研究方向',
      //   summary: '个人简介',
      //   papers: '论文数量',
      //   patents: '专利数量',
      //   awards: '获奖数量',
      //   company: '去向',
      //   position: '职位',
      //   photo: '照片路径'
      // },
    ];

    // 按年份从新到旧排序（最新的在前）
    function sortGraduatesByYear() {
      return graduatesData.sort((a, b) => {
        const yearA = parseInt(a.year);
        const yearB = parseInt(b.year);
        return yearB - yearA; // 降序：从新到旧
      });
    }

    // 渲染毕业生卡片
    function renderGraduateCards() {
      const container = document.getElementById('contentList');
      const sortedGraduates = sortGraduatesByYear(); // 使用排序后的数据

      if (sortedGraduates.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🎓</div>
            <p>暂无毕业生记录</p>
          </div>
        `;
        return;
      }

      // 使用分页数据渲染
      const currentPageItems = window.getCurrentPageItems ? window.getCurrentPageItems() : sortedGraduates;

      container.innerHTML = currentPageItems.map(graduate => `
        <div class="item-card" data-year="${graduate.year}">
          <div class="item-thumbnail">
            <img src="${graduate.photo}" alt="${graduate.name}" onerror="this.onerror=null; this.src='../../lab-logo.png'" />
          </div>
          <div class="item-content-wrapper">
            <div class="item-title">${graduate.name}</div>
            <div class="item-meta">
              <span>📅 ${graduate.year}届</span>
              <span>🎓 ${graduate.degree}</span>
              <span>🔬 ${graduate.field}</span>
            </div>
            <div class="item-content">
              <p>${graduate.summary}</p>
            </div>
            <div class="item-info">
              <div class="info-item">
                <span class="info-icon">📄</span>
                <span class="info-label">论文：${graduate.papers}</span>
              </div>
              <div class="info-item">
                <span class="info-icon">🔬</span>
                <span class="info-label">专利：${graduate.patents}</span>
              </div>
              <div class="info-item">
                <span class="info-icon">🏆</span>
                <span class="info-label">获奖：${graduate.awards}</span>
              </div>
            </div>
            <div class="item-footer">
              <div class="graduate-company">
                <span class="info-icon">🏢</span>
                <span>${graduate.company}</span>
              </div>
              <div class="tag">${graduate.position}</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 暴露给分页模块使用的渲染函数
    window.renderContent = renderGraduateCards;

    // 页面加载完成后自动渲染
    document.addEventListener('DOMContentLoaded', function() {
      const sortedGraduates = sortGraduatesByYear();
      if (window.initPagination) {
        window.initPagination(sortedGraduates);
        renderGraduateCards();
      } else {
        renderGraduateCards();
      }
    });
  </script>
</body>
</html>
