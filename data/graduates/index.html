<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>成员去向 - 智能系统实验室</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .category-content {
      padding-top: 70px;
    }
    .graduate-card {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      border: 1px solid var(--border-color);
    }
    .graduate-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary-color);
    }
    .graduate-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    .graduate-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .graduate-year {
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
    }
    .graduate-content {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .graduate-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .info-icon {
      font-size: 18px;
    }
    .info-label {
      font-weight: 500;
      color: var(--text-primary);
    }
    .graduate-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
    }
    .graduate-company {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: var(--primary-color);
    }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, #0066cc, #004499);
      color: #fff;
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .graduate-card[data-year] {
      animation: fadeIn 0.5s ease;
    }
  </style>
</head>
<body>
  <!-- 统一导航栏 -->
  <div id="navbar-container"></div>
  
  <main class="main-content category-content">
    <section class="section">
      <div class="section-container">
        <div class="section-header">
          <h2>成员去向</h2>
          <p class="section-subtitle">Graduate Career</p>
        </div>
        
        <div id="graduateList">
          <!-- 丁俊杰 - 2025届 -->
          <div class="graduate-card" data-year="2025">
            <div class="graduate-header">
              <div class="graduate-name">丁俊杰</div>
              <div class="graduate-year">2025届</div>
            </div>
            <div class="graduate-content">
              <p>丁俊杰同学于2022年加入智能系统实验室，师从王燕舞教授攻读硕士学位。在读期间，主要从事深度学习与时间序列预测相关研究，参与多项国家级项目，发表高水平论文2篇，授权发明专利1项。</p>
            </div>
            <div class="graduate-info">
              <div class="info-item">
                <span class="info-icon">🎓</span>
                <span class="info-label">学位：硕士</span>
              </div>
              <div class="info-item">
                <span class="info-icon">🔬</span>
                <span class="info-label">研究方向：深度学习</span>
              </div>
              <div class="info-item">
                <span class="info-icon">📄</span>
                <span class="info-label">论文：2篇</span>
              </div>
              <div class="info-item">
                <span class="info-icon">🔬</span>
                <span class="info-label">专利：1项</span>
              </div>
            </div>
            <div class="graduate-footer">
              <div class="graduate-company">
                <span class="info-icon">🏢</span>
                <span>就业单位：腾讯科技有限公司</span>
              </div>
              <div class="tag">算法工程师</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  
  <script src="../../js/search.js"></script>
  <script src="../../js/navbar-loader.js"></script>

</body>
</html>
