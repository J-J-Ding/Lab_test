<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>团队成员 - 智能系统实验室</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <style>
        .members-layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 40px;
            padding: 40px 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .side-nav {
            position: sticky;
            top: 120px;
            height: fit-content;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .side-nav h3 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
        }

        .side-nav ul {
            list-style: none;
        }

        .side-nav li {
            margin-bottom: 8px;
        }

        .side-nav a {
            display: block;
            padding: 10px 15px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .side-nav a:hover {
            background: var(--bg-secondary);
            color: var(--primary-color);
        }

        .side-nav a.active {
            background: var(--primary-color);
            color: #fff;
        }

        .members-content {
            min-height: 600px;
        }

        .members-section {
            margin-bottom: 40px;
        }

        .members-section h2 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .member-card {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            text-decoration: none;
        }

        .member-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-color);
        }

        .member-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .member-card-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .member-card-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .member-card-role {
            font-size: 13px;
            color: var(--text-light);
        }

        .member-card-info {
            margin-bottom: 15px;
        }

        .member-card-info p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .member-card-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-teacher {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .badge-student {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .members-layout {
                grid-template-columns: 1fr;
                padding: 20px;
            }

            .side-nav {
                position: static;
            }

            .member-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
  <!-- 统一导航栏 -->
  <div id="navbar-container"></div>
  
    <main class="main-content">
        <div class="members-layout">
            <aside class="side-nav">
                <h3>📋 快速导航</h3>
                <ul>
                    <li><a href="#all-members" class="active" onclick="switchSection('all-members', this)">所有成员</a></li>
                    <li><a href="#teachers" onclick="switchSection('teachers', this)">教师列表</a></li>
                    <li><a href="#students" onclick="switchSection('students', this)">学生列表</a></li>
                </ul>
            </aside>

            <div class="members-content">
                <section id="all-members" class="members-section">
                    <h2>所有成员</h2>
                    <div class="member-grid" id="members-grid-all"></div>
                </section>

                <section id="teachers" class="members-section" style="display: none;">
                    <h2>教师列表</h2>
                    <div class="member-grid" id="members-grid-teachers"></div>
                </section>

                <section id="students" class="members-section" style="display: none;">
                    <h2>学生列表</h2>
                    <div class="member-grid" id="members-grid-students"></div>
                </section>
            </div>
        </div>
    </main>

    <script src="../../js/search.js"></script>
    <script>
        // 成员数据集中存储
        const membersData = [
            {
                type: 'teacher',
                name: '王燕舞',
                role: '教授、博士生导师',
                email: 'wangyw@hust.edu.cn',
                avatar: 'teachers/Yanwu_Wang/王燕舞.png',
                link: 'teachers/Yanwu_Wang/index.html',
                research: ['基于深度学习的混杂数据挖掘、分析与预测', '基于强化学习的分布式协同优化调度', '基于群体智能的多尺度分布式协同控制']
            },
            {
                type: 'teacher',
                name: '肖江文',
                role: '教授、博士生导师',
                email: 'jwxiao@hust.edu.cn',
                avatar: 'teachers/Jiangwen_Xiao/肖江文.png',
                link: 'teachers/Jiangwen_Xiao/index.html',
                research: ['人工智能及在电力和能源系统中的应用', '基于群体智能的多尺度分布式协同控制']
            },
            {
                type: 'teacher',
                name: '刘骁康',
                role: '副教授',
                email: 'xiaokangliu@hust.edu.cn',
                avatar: 'teachers/Xiaokang_Liu/刘骁康.png',
                link: 'teachers/Xiaokang_Liu/index.html',
                research: ['智能电网的控制与优化', '分布式协同与群集智能']
            },
            {
                type: 'student',
                name: '丁俊杰',
                role: '2024级硕士研究生',
                email: 'junjieding@hust.edu.cn',
                avatar: 'students/Junjie_Ding/丁俊杰.jpg',
                link: 'students/Junjie_Ding/index.html',
                research: ['时序预测']
            },
        ];

        // 渲染成员卡片
        function renderMemberCards(containerId, members) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (members.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <p>暂无成员信息</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = members.map(member => `
                <a href="${member.link}" class="member-card">
                    <div class="member-card-header">
                        <img src="${member.avatar}" alt="${member.name}" class="member-card-avatar" onerror="this.src='../../lab-logo.png'">
                        <div>
                            <div class="member-card-name">${member.name}</div>
                            <div class="member-card-role">${member.role}</div>
                        </div>
                    </div>
                    <div class="member-card-info">
                        <p>📧 ${member.email}</p>
                        ${member.research.map(r => `<p>🎓 ${r}</p>`).join('')}
                        <span class="member-card-badge badge-${member.type}">${member.type === 'teacher' ? '教师' : '学生'}</span>
                    </div>
                </a>
            `).join('');
        }

        // 根据类型过滤成员
        function filterMembers(type) {
            if (type === 'all') {
                return membersData;
            }
            return membersData.filter(m => m.type === type);
        }

        // 切换section并渲染对应成员
        function switchSection(sectionId, element) {
            // 隐藏所有section
            document.querySelectorAll('.members-section').forEach(section => {
                section.style.display = 'none';
            });

            // 显示目标section
            document.getElementById(sectionId).style.display = 'block';

            // 更新导航active状态
            document.querySelectorAll('.side-nav a').forEach(link => {
                link.classList.remove('active');
            });
            if (element) {
                element.classList.add('active');
            } else {
                // 如果没有传入element，根据hash查找
                document.querySelectorAll('.side-nav a').forEach(a => {
                    if (a.getAttribute('href') === '#' + sectionId) {
                        a.classList.add('active');
                    }
                });
            }

            // 根据sectionId过滤并渲染成员
            let membersType = 'all';
            if (sectionId === 'teachers') membersType = 'teacher';
            if (sectionId === 'students') membersType = 'student';

            const filteredMembers = filterMembers(membersType);
            renderMemberCards(`members-grid-${sectionId}`, filteredMembers);

            // 阻止默认跳转
            return false;
        }

        // 初始化所有section的成员数据
        function initializeAllSections() {
            renderMemberCards('members-grid-all', filterMembers('all'));
            renderMemberCards('members-grid-teachers', filterMembers('teacher'));
            renderMemberCards('members-grid-students', filterMembers('student'));
        }

        // 根据URL锚点自动切换
        window.addEventListener('load', function() {
            // 先初始化所有section的数据
            initializeAllSections();

            // 再根据hash切换显示
            const hash = window.location.hash.substring(1);
            if (hash) {
                const section = document.getElementById(hash);
                if (section) {
                    switchSection(hash);
                }
            } else {
                // 默认显示所有成员
                switchSection('all-members');
            }
        });

        // 监听hash变化
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                switchSection(hash);
            }
        });
    </script>
    <script src="../../js/navbar-loader.js"></script>
    
</body>
</html>
