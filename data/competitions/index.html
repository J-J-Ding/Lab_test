<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>学科竞赛 - 智能系统实验室</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .category-content {
      padding-top: 70px;
    }
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 0;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .item-thumbnail {
      background: var(--bg-secondary);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }
    .item-thumbnail img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s ease;
    }
    .item-card:hover .item-thumbnail img {
      transform: scale(1.05);
    }
    .item-content-wrapper {
      padding: 30px;
      display: flex;
      flex-direction: column;
    }
    .item-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 15px;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    .item-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-content {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    .item-author {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .item-link:hover {
      color: var(--primary-dark);
    }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, #e67e22, #f39c12);
      color: #fff;
    }
    .btn-sm {
      padding: 8px 20px;
      font-size: 14px;
    }
    #contentList {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .item-card[data-date] {
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 统一导航栏 -->
  <div id="navbar-container"></div>
  
  <main class="main-content category-content">
    <section class="section">
      <div class="section-container">
        <div class="section-header">
          <h2>学科竞赛</h2>
          <p class="section-subtitle">Competitions</p>
        </div>
        
        <div id="contentList">
          <!-- 竞赛卡片 - 按获奖时间排序 -->

          <!-- ----------------------- -->
          <div class="item-card" data-date="2025-12-28">  <!-- 需要修改 -->
            <div class="item-thumbnail">
              <img src="20261228金融科技竞赛/封面图.jpg" alt="金融科技竞赛" />  <!-- 需要修改 -->
            </div>
            <div class="item-content-wrapper">
              <div class="item-title">第四届中国研究生金融科技创新大赛</div>  <!-- 需要修改 -->
              <div class="item-meta">
                <span>🏆 国家级特等奖</span>  <!-- 需要修改 -->
                <span>📅 2025-12-28</span>  <!-- 需要修改 -->
              </div>
              <div class="item-content">  <!-- 需要修改 -->
                第四届中国研究生金融科技创新大赛全国总决赛于2025年12月26日至28日在南京市建邺区举办。我院学子在本次比赛中奋勇争先，凭借扎实的科研功底与突出的创新能力，在八强争冠赛中斩获季军（全国第三名），取得我校在该赛事中的历史最佳成绩，为学校再添荣誉。
              </div>
              <div class="item-footer">
                <div class="item-author">
                  <span>👤 丁俊杰、张柏珵、陈卓、任俊霖</span>
                </div>
                <a href="20261228金融科技竞赛/index.html" class="btn btn-sm">查看详情</a>  <!-- 需要修改 -->
              </div>
            </div>
          </div>
          <!-- ----------------------- -->

        </div>
      </div>
    </section>
  </main>
  
  <script src="../../js/search.js"></script>
  <script src="../../js/navbar-loader.js"></script>

</body>
</html>
