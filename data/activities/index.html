<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>团建活动 - 智能系统实验室</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .category-content {
      padding-top: 70px;
    }
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .item-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 15px;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    .item-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-content {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .item-author {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item-author img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .item-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .item-link:hover {
      color: var(--primary-dark);
    }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, #0066cc, #004499);
      color: #fff;
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <!-- 统一导航栏 -->
  <div id="navbar-container"></div>
  
  <main class="main-content category-content">
    <section class="section">
      <div class="section-container">
        <div class="section-header">
          <h2>团建活动</h2>
          <p class="section-subtitle">Activities</p>
        </div>
        
        <div id="contentList">
          <div class="item-card">
            <h3 class="item-title">智能系统实验室十周年庆典</h3>
            <div class="item-meta">
              <span>📅 2025年6月18日</span>
              <span>📍 北京海淀会议中心</span>
              <span>👥 全体成员</span>
              <span class="tag">周年庆</span>
            </div>
            <p class="item-content">
              2025年6月18日，智能系统实验室隆重举办成立十周年庆典活动。本次庆典汇聚了实验室全体成员、历届毕业生代表以及特邀嘉宾，共同回顾实验室十年发展历程，展望未来发展方向。活动包括开幕式、成果展示、主题演讲、文艺表演和晚宴等环节，充分展现了实验室的学术氛围和文化特色。
            </p>
            <div class="item-footer">
              <div class="item-author">
                <img src="../../lab-logo.png" alt="实验室" />
                <span>智能系统实验室</span>
              </div>
              <a href="Ten_Years_Anniversary/index.html" class="item-link">查看详情 →</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>  
  
  <script src="../../js/search.js"></script>
  <script src="../../js/navbar-loader.js"></script>

</body>
</html>
