<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>团建活动 - 智能系统实验室</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .category-content {
      padding-top: 70px;
    }
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 0;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
      position: relative;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .item-thumbnail {
      background: var(--bg-secondary);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }
    .item-thumbnail img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s ease;
    }
    .item-card:hover .item-thumbnail img {
      transform: scale(1.05);
    }
    .item-thumbnail-placeholder {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: #fff;
      font-size: 48px;
      font-weight: bold;
    }
    .activity-type-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    .activity-type-badge.sports {
      background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
    }
    .activity-type-badge.celebration {
      background: linear-gradient(135deg, #feca57, #ff9f43);
    }
    .activity-type-badge.academic {
      background: linear-gradient(135deg, #5f27cd, #341f97);
    }
    .activity-type-badge.team {
      background: linear-gradient(135deg, #00d2d3, #01a3a4);
    }
    .activity-type-badge.outdoor {
      background: linear-gradient(135deg, #26de81, #20bf6b);
    }
    .item-content-wrapper {
      padding: 30px;
      display: flex;
      flex-direction: column;
    }
    .item-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 15px;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    .item-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-content {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    .item-author {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item-author img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .item-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .item-link:hover {
      color: var(--primary-dark);
    }
    .item-card[data-date] {
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 统一导航栏 -->
  <div id="navbar-container"></div>
  
  <main class="main-content category-content">
    <section class="section">
      <div class="section-container">
        <div class="section-header">
          <h2>团建活动</h2>
          <p class="section-subtitle">Activities</p>
        </div>

        <div id="contentList">
          <!-- 活动卡片将通过JS自动加载并排序 -->
        </div>
      </div>
    </section>
  </main>

  <script src="../../js/search.js"></script>
  <script src="../../js/navbar-loader.js"></script>
  <script>
    // 活动数据列表 - 按时间从新到老排列
    const activitiesData = [
      {
        date: '2025-12-11',
        thumbnail: '20251211羽毛球赛/羽毛球赛.jpg',
        title: '智能系统实验室2025年羽毛球友谊赛',
        location: '体育馆',
        participants: '全体成员',
        type: 'sports',
        typeName: '🏸 体育运动',
        summary: '2025年12月11日，智能系统实验室举办一年一度的羽毛球友谊赛活动。本次活动由实验室全体学生共同参与，不仅锻炼了身体，也增进了团队成员之间的友谊。',
        author: '智能系统实验室',
        link: '20251211羽毛球赛/index.html'
      },
      // 在此处添加更多活动，格式如下：
      // {
      //   date: 'YYYY-MM-DD',
      //   thumbnail: '文件夹/封面图.jpg',
      //   title: '活动标题',
      //   location: '活动地点',
      //   participants: '参与人员',
      //   type: 'sports'/'celebration'/'academic'/'team'/'outdoor',
      //   typeName: '类型名称',
      //   summary: '活动简介',
      //   author: '组织单位',
      //   link: '文件夹/index.html'
      // },
    ];

    // 按日期从新到旧排序（最新的在前）
    function sortActivitiesByDate() {
      return activitiesData.sort((a, b) => {
        const dateA = new Date(a.date);
        const dateB = new Date(b.date);
        return dateB - dateA; // 降序：从新到旧
      });
    }

    // 获取活动类型对应的类名
    function getActivityTypeClass(type) {
      const typeMap = {
        'sports': 'sports',
        'celebration': 'celebration',
        'academic': 'academic',
        'team': 'team',
        'outdoor': 'outdoor'
      };
      return typeMap[type] || 'sports';
    }

    // 渲染活动卡片
    function renderActivityCards() {
      const container = document.getElementById('contentList');
      const sortedActivities = sortActivitiesByDate(); // 使用排序后的数据

      if (sortedActivities.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🎉</div>
            <p>暂无活动</p>
          </div>
        `;
        return;
      }

      container.innerHTML = sortedActivities.map(activity => `
        <div class="item-card" data-date="${activity.date}">
          <div class="item-thumbnail">
            <img src="${activity.thumbnail}" alt="${activity.title}" onerror="this.onerror=null; this.src='../../lab-logo.png'" />
          </div>
          <div class="activity-type-badge ${getActivityTypeClass(activity.type)}">${activity.typeName}</div>
          <div class="item-content-wrapper">
            <div class="item-title">${activity.title}</div>
            <div class="item-meta">
              <span>📅 ${activity.date}</span>
              <span>📍 ${activity.location}</span>
              <span>👥 ${activity.participants}</span>
            </div>
            <div class="item-content">
              <p>${activity.summary}</p>
            </div>
            <div class="item-footer">
              <div class="item-author">
                <img src="../../lab-logo.png" alt="实验室" />
                <span>${activity.author}</span>
              </div>
              <a href="${activity.link}" class="item-link">查看详情 →</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 页面加载完成后自动渲染
    window.addEventListener('load', renderActivityCards);
  </script>
</body>
</html>
